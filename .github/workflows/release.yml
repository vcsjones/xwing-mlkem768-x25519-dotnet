name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    if: github.repository == 'vcsjones/xwing-mlkem768-x25519-dotnet'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 #v5.3.0
        with:
          dotnet-version: 11.0

      - name: Package
        run: |
          mkdir -p pkg
          dotnet pack -p:ContinuousIntegrationBuild=true -c Release -o pkg

          for f in pkg/*.nupkg; do
            mv -- "$f" "${f%.nupkg}_unsigned.nupkg"
          done

      - name: Artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 #v4.1.0
        with:
          subject-path: 'pkg/*.nupkg'

      - name: Create GitHub Release
        run: |
          tag_name="$(git describe --tags --abbrev=0)"
          gh release create "${tag_name}" --verify-tag --draft --generate-notes pkg/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
